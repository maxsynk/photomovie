<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PHOTO MOVIE - GALERIA</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <style>
        :root { --turquesa: #00d1d1; --dourado: #c5a059; --bg: #001a1a; --danger: #ff4d4d; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; min-height: 100vh; }
        
        .header { padding: 25px; border-bottom: 2px solid var(--dourado); background: rgba(0,0,0,0.6); position: sticky; top: 0; z-index: 100; backdrop-filter: blur(15px); }
        .header h1 { color: var(--dourado); letter-spacing: 5px; margin: 0; text-transform: uppercase; font-size: 1.8rem; font-weight: 900; cursor: pointer; }
        .header p { color: var(--dourado); font-size: 12px; margin-top: 5px; opacity: 0.7; letter-spacing: 3px; text-transform: uppercase; }

        .admin-panel { display: none; background: #002b2b; padding: 15px; border-bottom: 1px solid var(--dourado); gap: 10px; justify-content: center; flex-wrap: wrap; }

        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; padding: 15px; padding-bottom: 120px; }

        .video-card { 
            background: #000; border: 1px solid rgba(197, 160, 89, 0.3); border-radius: 12px; 
            overflow: hidden; aspect-ratio: 9/16; position: relative; cursor: pointer; transition: 0.2s;
        }
        .video-card:active { transform: scale(0.95); }
        .video-card img, .video-card video { width: 100%; height: 100%; object-fit: cover; }

        .btn-del-mini { position: absolute; top: 5px; right: 5px; background: var(--danger); border: none; color: white; border-radius: 50%; width: 30px; height: 30px; display: none; z-index: 10; font-weight: bold; }

        #modal-zoom { position: fixed; inset: 0; background: rgba(0,0,0,0.98); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
        #media-full { width: 85%; max-height: 70vh; border: 2px solid var(--dourado); border-radius: 15px; background: #000; }
        
        .modal-controls { margin-top: 25px; display: flex; gap: 10px; width: 85%; justify-content: center; flex-wrap: wrap; }
        
        .btn-action { padding: 12px 20px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; text-decoration: none; font-size: 12px; text-transform: uppercase; display: flex; align-items: center; justify-content: center; gap: 5px; }
        .btn-close { background: #333; color: white; }
        .btn-download { background: var(--dourado); color: black; }
        .btn-danger { background: var(--danger); color: white; }
        .btn-zip { background: #28a745; color: white; }

        .nav-footer { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 500; width: 90%; }
    </style>
</head>
<body>

    <div class="header">
        <h1 onclick="detectarAdmin()">PHOTO MOVIE</h1>
        <p id="nome-evento-titulo">Sincronizando...</p>
    </div>

    <div id="admin-panel" class="admin-panel">
        <button class="btn-action btn-zip" onclick="baixarTudoZip()">📦 BAIXAR TUDO (ZIP)</button>
        <button class="btn-action btn-danger" onclick="excluirTudo()">⚠️ APAGAR GALERIA</button>
    </div>

    <div id="gallery-container" class="gallery-grid"></div>

    <div class="nav-footer">
        <a href="index.html" class="btn-action btn-close" style="display: block; text-align: center;">← VOLTAR</a>
    </div>

    <div id="modal-zoom">
        <video id="media-full" controls playsinline crossorigin="anonymous"></video>
        <div class="modal-controls">
            <button class="btn-action btn-close" onclick="fecharZoom()">FECHAR</button>
            <button id="btn-download-force" class="btn-action btn-download">BAIXAR MP4</button>
            <button id="btn-delete-single" class="btn-action btn-danger admin-only" style="display:none">EXCLUIR</button>
        </div>
    </div>

<script>
    const WORKER_URL = "https://photomovie.maxprimefotovideo.workers.dev";
    let isAdmin = false;
    let cliquesAdmin = 0;
    let listaArquivosAtuais = [];

    window.onload = () => {
        const config = JSON.parse(localStorage.getItem('config_atual'));
        if(!config) { window.location.href = "index.html"; return; }
        document.getElementById('nome-evento-titulo').innerText = config.nome.replace(/_/g, ' ');
        carregarArquivos(config.nome);
        setInterval(() => carregarArquivos(config.nome, true), 8000); // Auto-refresh suave
    };

    function detectarAdmin() {
        cliquesAdmin++;
        if(cliquesAdmin >= 5) {
            isAdmin = true;
            document.getElementById('admin-panel').style.display = 'flex';
            document.querySelectorAll('.btn-del-mini').forEach(b => b.style.display = 'block');
            alert("MODO ADMIN ATIVADO");
            cliquesAdmin = 0;
        }
    }

    async function carregarArquivos(eventoNome, isSilent = false) {
        const container = document.getElementById('gallery-container');
        if(!isSilent) container.innerHTML = "<p>Buscando arquivos...</p>";

        try {
            const res = await fetch(`${WORKER_URL}/listar-galeria?evento=${encodeURIComponent(eventoNome)}`);
            const dados = await res.json();
            listaArquivosAtuais = dados;
            
            // FILTRO: Só mostra os que contém "final_"
            const finais = dados.filter(f => f.path.includes('final_'));
            
            if(!isSilent) container.innerHTML = "";
            if(finais.length === 0 && !isSilent) {
                container.innerHTML = "<p style='grid-column: 1/-1; opacity:0.5; margin-top:50px;'>Aguardando processamento dos vídeos...</p>";
                return;
            }

            if(isSilent && finais.length === container.querySelectorAll('.video-card').length) return;

            container.innerHTML = "";
            finais.forEach(file => {
                const url = `${WORKER_URL}/stream?id=${encodeURIComponent(file.path)}`;
                const card = document.createElement('div');
                card.className = 'video-card';
                card.innerHTML = `
                    <video src="${url}#t=0.5" muted playsinline></video>
                    <button class="btn-del-mini" style="display:${isAdmin?'block':'none'}" onclick="event.stopPropagation(); excluirArquivo('${file.path}')">X</button>
                `;
                card.onclick = () => abrirZoom(url, file.path);
                container.appendChild(card);
            });
        } catch (e) { console.error("Erro na galeria", e); }
    }

    function abrirZoom(url, path) {
        const modal = document.getElementById('modal-zoom');
        const video = document.getElementById('media-full');
        modal.style.display = 'flex';
        video.src = url;
        video.play();

        document.getElementById('btn-download-force').onclick = () => forcarDownload(url, path.split('/').pop());
        
        const btnDel = document.getElementById('btn-delete-single');
        if(isAdmin) {
            btnDel.style.display = 'flex';
            btnDel.onclick = () => { excluirArquivo(path); fecharZoom(); };
        }
    }

    async function excluirArquivo(path) {
        if(!confirm("Deseja apagar este vídeo permanentemente?")) return;
        const config = JSON.parse(localStorage.getItem('config_atual'));
        try {
            await fetch(`${WORKER_URL}/deletar`, {
                method: 'POST',
                body: JSON.stringify({ id: path, evento: config.nome })
            });
            carregarArquivos(config.nome);
        } catch (e) { alert("Erro ao deletar"); }
    }

    async function excluirTudo() {
        const pass = prompt("Para apagar TUDO, digite 'apagar':");
        if(pass !== 'apagar') return;
        
        const config = JSON.parse(localStorage.getItem('config_atual'));
        const finais = listaArquivosAtuais.filter(f => f.path.includes('final_'));
        
        for(let f of finais) {
            await fetch(`${WORKER_URL}/deletar`, {
                method: 'POST',
                body: JSON.stringify({ id: f.path, evento: config.nome })
            });
        }
        carregarArquivos(config.nome);
    }

    async function baixarTudoZip() {
        const btn = document.querySelector('.btn-zip');
        const origText = btn.innerText;
        btn.innerText = "⚡ PREPARANDO PACOTE...";
        
        const zip = new JSZip();
        const finais = listaArquivosAtuais.filter(f => f.path.includes('final_'));
        
        try {
            for(let i = 0; i < finais.length; i++) {
                btn.innerText = `⚡ BAIXANDO ${i+1}/${finais.length}`;
                const url = `${WORKER_URL}/stream?id=${encodeURIComponent(finais[i].path)}`;
                const response = await fetch(url);
                const blob = await response.blob();
                zip.file(`video_${i+1}.mp4`, blob);
            }
            
            btn.innerText = "📦 COMPRIMINDO...";
            const content = await zip.generateAsync({type:"blob"});
            saveAs(content, `Galeria_${document.getElementById('nome-evento-titulo').innerText}.zip`);
        } catch (e) { alert("Erro ao gerar ZIP"); }
        finally { btn.innerText = origText; }
    }

    async function forcarDownload(url, filename) {
        const btn = document.getElementById('btn-download-force');
        btn.innerText = "⏳...";
        try {
            const res = await fetch(url);
            const blob = await res.blob();
            saveAs(blob, filename);
        } catch (e) { alert("Erro no download."); }
        finally { btn.innerText = "BAIXAR MP4"; }
    }

    function fecharZoom() {
        document.getElementById('modal-zoom').style.display = 'none';
        const v = document.getElementById('media-full');
        v.pause(); v.src = "";
    }
</script>
</body>
</html>

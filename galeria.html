<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PHOTO MOVIE - GALERIA</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <style>
        :root { --turquesa: #00d1d1; --dourado: #c5a059; --bg: #001a1a; --danger: #ff4d4d; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; }
        .header { padding: 20px; border-bottom: 2px solid var(--dourado); background: rgba(0,0,0,0.8); position: sticky; top: 0; z-index: 100; }
        #nome-evento-titulo { color: var(--dourado); font-size: 16px; text-transform: uppercase; font-weight: bold; margin: 5px 0; letter-spacing: 2px; }
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; padding: 15px; }
        .video-card { background: #000; border-radius: 10px; overflow: hidden; aspect-ratio: 9/16; position: relative; border: 1px solid #333; }
        .video-card video { width: 100%; height: 100%; object-fit: cover; }
        .video-number { position: absolute; top: 5px; right: 5px; background: rgba(0,0,0,0.6); color: var(--dourado); padding: 2px 6px; border-radius: 4px; font-size: 12px; }
        .nav-footer { position: fixed; bottom: 20px; width: 100%; display: flex; justify-content: center; }
        .btn-voltar { padding: 15px 40px; background: #333; color: white; text-decoration: none; border-radius: 30px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="header">
        <h1>PHOTO MOVIE</h1>
        <p id="nome-evento-titulo">CARREGANDO...</p>
    </div>

    <div id="gallery-container" class="gallery-grid"></div>

    <div class="nav-footer">
        <a href="index.html" class="btn-voltar">← VOLTAR</a>
    </div>

<script>
    const WORKER_URL = "https://photomovie.maxprimefotovideo.workers.dev";
    let idPastaReal = "";

    async function atualizarTudo(isSilent = false) {
        const dados = localStorage.getItem('config_atual');
        if(!dados) return;
        const config = JSON.parse(dados);

        // ATUALIZA O NOME (A CAPA) NO TOPO
        document.getElementById('nome-evento-titulo').innerText = config.nome.replace(/_/g, ' ');

        // DEFINE O ID DA PASTA (O NÚMERO QUE NÃO MUDA)
        if(!config.id_fixo) {
            config.id_fixo = config.nome;
            localStorage.setItem('config_atual', JSON.stringify(config));
        }
        idPastaReal = config.id_fixo;

        // BUSCA OS VÍDEOS NA PASTA REAL
        try {
            const res = await fetch(`${WORKER_URL}/listar-galeria?evento=${encodeURIComponent(idPastaReal)}`);
            const arquivos = await res.json();
            const filtrados = arquivos.filter(f => f.path.includes('final_'));
            
            renderizar(filtrados, isSilent);
        } catch (e) { console.error(e); }
    }

    function renderizar(lista, isSilent) {
        const container = document.getElementById('gallery-container');
        if(isSilent && lista.length === container.querySelectorAll('.video-card').length) return;

        container.innerHTML = lista.length ? "" : "Aguardando vídeos...";
        lista.forEach((file, index) => {
            const url = `${WORKER_URL}/stream?id=${encodeURIComponent(file.path)}`;
            const card = document.createElement('div');
            card.className = 'video-card';
            card.innerHTML = `
                <div class="video-number">#${index + 1}</div>
                <video src="${url}#t=0.5" muted playsinline></video>
            `;
            container.appendChild(card);
        });
    }

    window.onload = () => {
        atualizarTudo();
        // Sincroniza o nome e os vídeos a cada 3 segundos
        setInterval(() => atualizarTudo(true), 3000);
    };
</script>
</body>
</html>

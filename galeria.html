<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GALERIA - Photo Movie</title>
    <style>
        :root { --turquesa: #00d1d1; --dourado: #c5a059; --preto: #050505; }
        body { margin: 0; background: var(--preto); color: white; font-family: sans-serif; }
        .header { background: #111; padding: 20px; text-align: center; border-bottom: 2px solid var(--dourado); }
        .header h1 { color: var(--dourado); margin: 0; font-size: 24px; letter-spacing: 3px; }
        
        .search-container { padding: 15px; display: flex; justify-content: center; }
        #search-input { 
            width: 90%; padding: 12px; border-radius: 25px; border: 1px solid #333; 
            background: #1a1a1a; color: white; text-align: center; font-size: 16px;
        }

        .grid { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); 
            gap: 10px; padding: 15px; 
        }
        .item { 
            position: relative; aspect-ratio: 9/16; background: #111; 
            border-radius: 8px; overflow: hidden; border: 1px solid #222;
        }
        .item img, .item video { width: 100%; height: 100%; object-fit: cover; }
        
        /* Marca de Impresso */
        .status-tag { 
            position: absolute; top: 5px; right: 5px; padding: 4px 8px; 
            border-radius: 4px; font-size: 10px; font-weight: bold;
        }
        .status-impresso { background: #2ecc71; color: white; }
    </style>
</head>
<body>

    <div class="header">
        <h1 id="event-name">PHOTO MOVIE</h1>
        <small id="event-date"></small>
    </div>

    <div class="search-container">
        <input type="text" id="search-input" placeholder="🔍 Buscar número do vídeo..." oninput="filtrarGaleria()">
    </div>

    <div id="gallery-grid" class="grid">
        </div>

<script>
    const WORKER_URL = "https://photomovie.maxprimefotovideo.workers.dev";
    let allMedia = [];

    async function carregarGaleria() {
        // 1. Pega o evento que está ativo no momento
        const config = JSON.parse(localStorage.getItem('config_atual'));
        if (!config) {
            alert("Nenhum evento configurado!");
            return;
        }

        // MOSTRA O NOME VISUAL NO TOPO
        document.getElementById('event-name').innerText = config.nome.toUpperCase();
        document.getElementById('event-date').innerText = config.data || "";

        // 2. A CHAVE MESTRA: Usamos o id_fixo para buscar os arquivos, NÃO o nome.
        const pastaNoServidor = config.id_fixo || config.nome;

        try {
            // Busca a lista de arquivos da pasta correta
            const res = await fetch(`${WORKER_URL}/list?evento=${pastaNoServidor}`);
            const data = await res.json();
            
            // Inverte para os mais novos aparecerem primeiro
            allMedia = data.files.reverse(); 
            renderizar(allMedia, pastaNoServidor);
        } catch (e) {
            console.error("Erro ao carregar arquivos:", e);
        }
    }

    function renderizar(lista, pasta) {
        const grid = document.getElementById('gallery-grid');
        grid.innerHTML = "";

        lista.forEach(file => {
            // Link usando a PASTA FIXA
            const fileUrl = `${WORKER_URL}/stream?id=${pasta}/${file.name}`;
            
            const div = document.createElement('div');
            div.className = 'item';
            div.onclick = () => window.location.href = `download.html?file=${file.name}&folder=${pasta}`;

            // Se for vídeo, mostra o vídeo. Se for foto, mostra a foto.
            if(file.name.toLowerCase().endsWith('.mp4')) {
                div.innerHTML = `<video src="${fileUrl}" muted loop onmouseover="this.play()" onmouseout="this.pause()"></video>`;
            } else {
                div.innerHTML = `<img src="${fileUrl}">`;
            }

            // Lógica de "IMPRESSO" (Se você usa o sistema de impressão automática)
            if(file.impresso) {
                div.innerHTML += `<span class="status-tag status-impresso">IMPRESSO</span>`;
            }

            grid.appendChild(div);
        });
    }

    function filtrarGaleria() {
        const term = document.getElementById('search-input').value.toLowerCase();
        const config = JSON.parse(localStorage.getItem('config_atual'));
        const filtered = allMedia.filter(f => f.name.toLowerCase().includes(term));
        renderizar(filtered, config.id_fixo || config.nome);
    }

    // Inicia
    carregarGaleria();

    // Atualiza a cada 10 segundos para ver se chegaram vídeos novos
    setInterval(carregarGaleria, 10000);
</script>
</body>
</html>

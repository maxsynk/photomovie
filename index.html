<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CENTRAL - Photo Print</title>
    <style>
        :root { 
            --turquesa-dark: #004d4d; /* Turquesa bem escuro */
            --dourado: #c5a059;      /* Dourado mais sóbrio/elegante */
            --dourado-brilho: #e8d0a9;
            --bg-modal: rgba(0, 30, 30, 0.95);
        }
        
        body { 
            margin: 0; 
            background: var(--turquesa-dark); 
            color: white; 
            font-family: 'Segoe UI', Roboto, Helvetica, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* 1- Cabeçalho */
        .header {
            margin-top: 1.8cm;
            text-align: center;
        }

        .header h1 {
            color: var(--dourado);
            font-size: 45px;
            font-weight: 900;
            letter-spacing: 2px;
            margin: 0;
            text-transform: uppercase;
        }

        .header p {
            color: #ffffff;
            font-size: 16px;
            margin: 0;
            letter-spacing: 3px;
            font-weight: 300;
            text-transform: lowercase;
        }

        /* Container de Botões */
        .main-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            width: 85%;
            max-width: 350px;
        }

        .btn-central {
            padding: 18px;
            margin: 10px 0;
            border-radius: 12px;
            border: 1px solid var(--dourado);
            background: linear-gradient(135deg, var(--dourado), #8e6d2d);
            color: #1a1a1a;
            font-weight: 700;
            font-size: 14px;
            text-transform: uppercase;
            cursor: pointer;
            text-decoration: none;
            text-align: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            display: none; 
            transition: all 0.3s ease;
        }

        #btn-login {
            display: block; /* Visível inicialmente */
            background: transparent;
            color: var(--dourado);
            border: 2px solid var(--dourado);
        }

        /* 3- Rodapé fixo */
        .footer-status {
            padding-bottom: 20px;
            font-size: 11px;
            color: rgba(255,255,255,0.4);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* 5- Modal de Senha Bonito */
        #modal-senha {
            position: fixed;
            inset: 0;
            background: var(--bg-modal);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            backdrop-filter: blur(10px);
        }

        .modal-content {
            background: #002b2b;
            padding: 30px;
            border-radius: 20px;
            border: 1px solid var(--dourado);
            text-align: center;
            width: 80%;
            max-width: 300px;
        }

        .modal-content h3 { color: var(--dourado); margin-bottom: 20px; }

        .modal-content input {
            width: 100%;
            padding: 15px;
            background: #000;
            border: 1px solid #333;
            color: var(--dourado);
            border-radius: 10px;
            text-align: center;
            font-size: 24px;
            letter-spacing: 10px;
            margin-bottom: 20px;
            box-sizing: border-box;
        }

        .btn-confirm {
            background: var(--dourado);
            color: #000;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            font-weight: bold;
            width: 100%;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>PHOTO PRINT</h1>
        <p>colecionando momentos</p>
    </div>

    <div class="main-container" id="menu-central">
        <button id="btn-login" class="btn-central" onclick="abrirModal()">🔓 ENTRAR NO SISTEMA</button>

        <a href="https://phottoprint.github.io/photomovie/" class="btn-protected btn-central">📸 NOVO EVENTO</a>
        <a href="https://phottoprint.github.io/photomovie/galeria.html" class="btn-protected btn-central">🎞️ ACESSAR GALERIA</a>
        
        <button id="btn-lock" class="btn-protected btn-central" onclick="bloquear()" style="background: transparent; color: #ff4444; border-color: #444; margin-top: 20px;">SAIR</button>
    </div>

    <div class="footer-status">sistema de gestao 360</div>

    <div id="modal-senha">
        <div class="modal-content">
            <h3>AUTENTICAÇÃO</h3>
            <input type="password" id="input-senha" inputmode="numeric" pattern="[0-9]*" placeholder="••••">
            <button class="btn-confirm" onclick="validarSenha()">CONFIRMAR</button>
            <p onclick="fecharModal()" style="margin-top:15px; font-size:12px; cursor:pointer">Cancelar</p>
        </div>
    </div>

<script>
    const SENHA_MESTRA = "1234"; 

    // 6- Verifica se já estava logado antes
    window.onload = () => {
        if(sessionStorage.getItem('logado') === 'true') {
            liberarSistema();
        }
    }

    function abrirModal() {
        document.getElementById('modal-senha').style.display = 'flex';
        document.getElementById('input-senha').focus();
        
        // 4- Chama a biometria direto se o aparelho suportar
        tentarBiometria();
    }

    function fecharModal() {
        document.getElementById('modal-senha').style.display = 'none';
        document.getElementById('input-senha').value = '';
    }

    async function tentarBiometria() {
        if (window.PublicKeyCredential) {
            // Isso aciona o sensor de digital/rosto padrão do celular
            // Nota: O comportamento depende do navegador, alguns exigem configuração de servidor.
            console.log("Solicitando biometria...");
        }
    }

    function validarSenha() {
        const input = document.getElementById('input-senha');
        if (input.value === SENHA_MESTRA) {
            sessionStorage.setItem('logado', 'true'); // Salva que está logado
            fecharModal();
            liberarSistema();
        } else {
            alert("Senha Incorreta");
            input.value = '';
        }
    }

    function liberarSistema() {
        document.getElementById('btn-login').style.display = 'none';
        document.querySelectorAll('.btn-protected').forEach(b => b.style.display = 'block');
    }

    function bloquear() {
        sessionStorage.removeItem('logado');
        location.reload();
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MASTER HUB | SISTEMA GESTÃO 360º</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00ff41; --bg: #050505; --card: #111; --dourado: #c5a059; }
        body { background: var(--bg); color: white; font-family: 'Orbitron', sans-serif; margin: 0; text-align: center; }
        
        .container { padding: 40px 20px; max-width: 600px; margin: auto; }
        .header h1 { font-weight: 900; letter-spacing: 5px; color: var(--neon); text-shadow: 0 0 15px var(--neon); margin-bottom: 5px; }
        .header p { font-size: 10px; letter-spacing: 3px; opacity: 0.7; margin-bottom: 40px; }

        .menu-grid { display: grid; grid-template-columns: 1fr; gap: 20px; }
        
        .btn-main {
            background: none; border: 2px solid var(--neon); color: var(--neon);
            padding: 20px; font-family: 'Orbitron'; font-weight: bold; font-size: 14px;
            text-transform: uppercase; cursor: pointer; border-radius: 5px;
            transition: 0.3s; text-decoration: none; display: block;
        }
        .btn-main:hover { background: var(--neon); color: black; box-shadow: 0 0 20px var(--neon); }

        /* Estilo para o Botão do Cliente */
        .btn-cliente {
            border-color: var(--dourado); color: var(--dourado);
            margin-top: 10px;
        }
        .btn-cliente:hover { background: var(--dourado); color: black; box-shadow: 0 0 20px var(--dourado); }

        .status-bar { margin-top: 50px; padding: 15px; background: var(--card); border-radius: 10px; border-left: 5px solid var(--neon); text-align: left; }
        .status-bar label { font-size: 10px; display: block; opacity: 0.5; }
        .status-bar span { font-size: 16px; font-weight: bold; color: var(--neon); }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>MASTER HUB</h1>
            <p>SISTEMA GESTÃO 360º</p>
        </div>

        <div class="menu-grid">
            <a href="camera.html" class="btn-main">📸 ABRIR CAPTURA</a>
            <a href="config.html" class="btn-main">⚙️ CONFIGURAÇÕES</a>
            <a href="galeria.html" class="btn-main">🖼️ VER GALERIA ADMIN</a>
            
            <button onclick="gerarLinkZap()" class="btn-main btn-cliente">
                🔗 COPIAR LINK CLIENTE
            </button>
        </div>

        <div class="status-bar">
            <label>EVENTO ATUAL:</label>
            <span id="txt-evento">NENHUM SELECIONADO</span>
        </div>
    </div>

    <script>
        function atualizarStatus() {
            const gDados = localStorage.getItem('config_atual');
            if (gDados) {
                const config = JSON.parse(gDados);
                document.getElementById('txt-evento').innerText = (config.nome || "SEM NOME").toUpperCase();
            }
        }

        function gerarLinkZap() {
            const gDados = localStorage.getItem('config_atual');
            if (!gDados) {
                alert("ERRO: Configure um evento primeiro!");
                return;
            }

            const config = JSON.parse(gDados);
            // Prioriza o ID FIXO para o link ser estável, se não usa o Nome
            const idEvento = config.id_fixo || config.nome;
            
            // Monta a URL completa (ajusta automaticamente conforme o seu domínio)
            const baseURL = window.location.origin + window.location.pathname.replace('index.html', '');
            const linkFinal = `${baseURL}galeria.html?evento=${encodeURIComponent(idEvento)}`;

            // Copia para o celular/computador
            navigator.clipboard.writeText(linkFinal).then(() => {
                alert("LINK COPIADO COM SUCESSO!\n\nEvento: " + idEvento + "\nCole no WhatsApp do cliente.");
            }).catch(() => {
                // Caso o navegador bloqueie a cópia direta
                prompt("COPIE O LINK ABAIXO:", linkFinal);
            });
        }

        window.onload = atualizarStatus;
    </script>
</body>
</html>

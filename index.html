<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PHOTO MOVIE - Câmera Ultra Fluida</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; }
        
        /* Títulos Fixos e Pulsantes - Não saem daqui por nada */
        .brand-fixed {
            position: fixed; top: 0; left: 0; width: 100%; text-align: center;
            padding-top: 25px; z-index: 999; pointer-events: none;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
        }
        .neon-title { 
            font-size: 2.8rem; font-weight: 900; color: #9200ff;
            text-shadow: 0 0 15px #9200ff; margin: 0;
            animation: pulse 1s infinite alternate;
        }
        .subtitle { color: white; letter-spacing: 4px; font-size: 0.7rem; animation: pulse 1.2s infinite alternate; }
        @keyframes pulse { from { opacity: 0.7; transform: scale(1); } to { opacity: 1; transform: scale(1.03); } }

        /* Preview - Usamos o VIDEO direto para ser fluido, o Canvas fica oculto só para gravar */
        #preview-video { width: 100vw; height: 100vh; object-fit: cover; }
        #moldura-overlay { position: fixed; inset: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; object-fit: cover; }
        #hidden-canvas { display: none; }

        /* Controles */
        .controls { position: fixed; bottom: 80px; width: 100%; display: flex; justify-content: center; z-index: 100; }
        .shutter { width: 80px; height: 80px; border: 5px solid white; border-radius: 50%; box-shadow: 0 0 20px #9200ff; cursor: pointer; }
        
        /* Contador */
        #status-msg { 
            position: fixed; inset: 0; display: none; align-items: center; justify-content: center; 
            z-index: 500; font-size: 8rem; font-weight: 900; color: white; background: rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

    <div class="brand-fixed">
        <h1 class="neon-title">PHOTO MOVIE</h1>
        <div class="subtitle">COLECIONANDO MOMENTOS</div>
    </div>

    <img id="moldura-overlay" src="" alt="">
    
    <video id="preview-video" autoplay playsinline muted></video>
    
    <canvas id="hidden-canvas" width="720" height="1280"></canvas>

    <div id="status-msg">3</div>

    <div class="controls">
        <div class="shutter" onclick="iniciarContagem()"></div>
    </div>

<script>
    const video = document.getElementById('preview-video');
    const canvas = document.getElementById('hidden-canvas');
    const ctx = canvas.getContext('2d');
    const molduraImg = document.getElementById('moldura-overlay');
    const status = document.getElementById('status-msg');
    let recorder;
    let chunks = [];

    // 1. CARREGAR TUDO ANTES DE LIBERAR A CAMERA
    async function init() {
        // Recupera a moldura que você salvou no IndexedDB ou LocalStorage no passo anterior
        // Para teste, estou pegando uma do sistema ou a última usada
        const savedFrame = localStorage.getItem('activeFrame');
        if(savedFrame) molduraImg.src = savedFrame;

        try {
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } },
                audio: false 
            });
            video.srcObject = stream;
        } catch (err) {
            alert("Erro na câmera: " + err);
        }
    }

    // 2. CONTAGEM REGRESSIVA
    function iniciarContagem() {
        let c = 3;
        status.style.display = 'flex';
        status.innerText = c;
        
        const timer = setInterval(() => {
            c--;
            if(c > 0) {
                status.innerText = c;
            } else {
                clearInterval(timer);
                status.innerText = "";
                gravar();
            }
        }, 1000);
    }

    // 3. GRAVAÇÃO SEM TRAVAR O PREVIEW
    function gravar() {
        chunks = [];
        // O segredo da fluidez: O Canvas só começa a desenhar no momento do REC
        const recordLoop = () => {
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            if(molduraImg.src) ctx.drawImage(molduraImg, 0, 0, canvas.width, canvas.height);
            if(recorder && recorder.state === "recording") requestAnimationFrame(recordLoop);
        };

        const stream = canvas.captureStream(30); // 30 FPS estável
        recorder = new MediaRecorder(stream, { mimeType: 'video/webm;codecs=vp8' });

        recorder.ondataavailable = e => chunks.push(e.data);
        recorder.onstop = () => {
            const blob = new Blob(chunks, { type: 'video/webm' });
            console.log("Vídeo Processado com Moldura!");
            // PRÓXIMO PASSO: Enviar para o IndexedDB da Galeria
        };

        recorder.start();
        recordLoop();

        let tempo = 10;
        const countdown = setInterval(() => {
            tempo--;
            status.innerText = tempo + "s";
            if(tempo <= 3) status.style.color = "#ff8c00";
            if(tempo <= 0) {
                clearInterval(countdown);
                recorder.stop();
                status.innerText = "FINALIZOU!";
                status.style.color = "#ff0000";
                setTimeout(() => { status.style.display = 'none'; status.style.color = "white"; }, 1500);
            }
        }, 1000);
    }

    init();
</script>
</body>
</html>

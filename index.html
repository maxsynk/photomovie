<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PHOTO MOVIE FX - High Performance</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.11.6/dist/ffmpeg.min.js"></script>
    <style>
        :root { --neon: #9200ff; --cyan: #00f2ff; }
        body { margin: 0; background: #000; color: white; font-family: sans-serif; overflow: hidden; }

        /* LOADER DE ALTA PRIORIDADE */
        #loader { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.95); 
            z-index: 5000; display: none; flex-direction: column; align-items: center; justify-content: center; 
        }
        .progress-container { width: 80%; height: 8px; background: #222; border-radius: 4px; margin-top: 15px; overflow: hidden; }
        #progress-bar { width: 0%; height: 100%; background: var(--neon); transition: width 0.2s; }

        .screen { display: none; min-height: 100vh; width: 100vw; flex-direction: column; align-items: center; position: absolute; }
        .active { display: flex; }

        /* BOTOES DE EFEITO RAPIDOS */
        .fx-selector { position: absolute; top: 70px; display: flex; gap: 5px; z-index: 100; padding: 0 10px; }
        .fx-card { 
            background: rgba(0,0,0,0.8); border: 1px solid #333; padding: 10px; border-radius: 10px; 
            font-size: 10px; text-align: center; min-width: 60px;
        }
        .fx-card.selected { border-color: var(--cyan); color: var(--cyan); font-weight: bold; }

        #vid-preview { width: 100%; height: 100vh; object-fit: cover; }
        .shutter-btn { width: 75px; height: 75px; border: 5px solid white; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .shutter-red { width: 55px; height: 55px; background: red; border-radius: 50%; }
        
        /* ESTILO DO FORM */
        .setup-box { margin-top: 80px; width: 85%; background: #111; padding: 20px; border-radius: 20px; border: 1px solid #333; }
        input[type="text"] { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #444; color: white; border-radius: 8px; box-sizing: border-box; }
    </style>
</head>
<body>

    <div id="loader">
        <div id="loader-icon" class="shutter-btn" style="border-color: var(--neon); animation: pulse 1s infinite alternate;">
            <div class="shutter-red" style="background: var(--neon);"></div>
        </div>
        <p id="loader-text" style="margin-top: 20px; letter-spacing: 2px;">CARREGANDO MOTOR...</p>
        <div class="progress-container"><div id="progress-bar"></div></div>
    </div>

    <div id="screen-menu" class="screen active">
        <div class="setup-box">
            <h2 style="color:var(--neon); margin:0;">CONFIG EVENTO</h2>
            <input type="text" id="event-name" placeholder="Nome do Evento">
            
            <p style="font-size: 12px; color: #888; margin-bottom: 5px;">Moldura (Opcional):</p>
            <input type="file" id="event-frame" accept="image/png">
            
            <div style="margin-top: 20px; padding: 10px; background: #000; border-radius: 10px; display: flex; align-items: center; justify-content: space-between;">
                <span style="font-size: 13px;">Usar Moldura?</span>
                <input type="checkbox" id="use-frame" checked>
            </div>

            <button onclick="iniciarApp()" style="margin-top:20px; width:100%; padding:15px; background:var(--neon); border:none; border-radius:10px; color:white; font-weight:bold;">ABRIR CÂMERA</button>
        </div>
    </div>

    <div id="screen-camera" class="screen">
        <div class="fx-selector">
            <div class="fx-card selected" onclick="selectFX('boom', this)">BOOMERANG</div>
            <div class="fx-card" onclick="selectFX('slow', this)">SLOW</div>
            <div class="fx-card" onclick="selectFX('fast', this)">FAST</div>
            <div class="fx-card" onclick="selectFX('rev', this)">REVERSO</div>
        </div>

        <video id="vid-preview" autoplay playsinline muted></video>
        <canvas id="rec-canvas" width="720" height="1280" style="display:none"></canvas>
        <img id="frame-img" style="display:none">

        <div style="position:absolute; bottom:40px; width:100%; display:flex; justify-content:space-evenly; align-items:center;">
            <button onclick="nav('screen-gallery')" style="background:none; border:none; font-size:25px;">🎞️</button>
            <div class="shutter-btn" onclick="startCountdown()"><div class="shutter-red"></div></div>
            <button onclick="toggleCam()" style="background:none; border:none; font-size:25px;">🔄</button>
        </div>
    </div>

<script>
    const { createFFmpeg, fetchFile } = FFmpeg;
    const ffmpeg = createFFmpeg({ log: false }); // Log desativado para ganhar performance
    let selectedFX = 'boom';
    let stream, recorder, chunks = [], currentCam = "environment";

    // 1. PRÉ-CARREGAMENTO DO MOTOR
    async function initEngine() {
        document.getElementById('loader').style.display = 'flex';
        if (!ffmpeg.isLoaded()) {
            await ffmpeg.load();
        }
        document.getElementById('loader').style.display = 'none';
    }
    initEngine();

    function selectFX(type, el) {
        selectedFX = type;
        document.querySelectorAll('.fx-card').forEach(c => c.classList.remove('selected'));
        el.classList.add('selected');
    }

    function nav(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    async function iniciarApp() {
        const frameFile = document.getElementById('event-frame').files[0];
        const useFrame = document.getElementById('use-frame').checked;

        if (useFrame && frameFile) {
            const reader = new FileReader();
            reader.onload = e => { 
                document.getElementById('frame-img').src = e.target.result;
                nav('screen-camera');
                startVideo();
            };
            reader.readAsDataURL(frameFile);
        } else {
            document.getElementById('frame-img').src = ""; // Sem moldura
            nav('screen-camera');
            startVideo();
        }
    }

    async function startVideo() {
        if (stream) stream.getTracks().forEach(t => t.stop());
        stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: currentCam, width: 1280, height: 720 },
            audio: false
        });
        document.getElementById('vid-preview').srcObject = stream;
    }

    function startCountdown() {
        let c = 3;
        const l = document.getElementById('loader');
        const lt = document.getElementById('loader-text');
        l.style.display = 'flex';
        lt.innerText = c;
        
        let timer = setInterval(() => {
            c--;
            lt.innerText = c;
            if(c <= 0) {
                clearInterval(timer);
                l.style.display = 'none';
                record();
            }
        }, 1000);
    }

    function record() {
        chunks = [];
        const canvas = document.getElementById('rec-canvas');
        const ctx = canvas.getContext('2d');
        const video = document.getElementById('vid-preview');
        const frame = document.getElementById('frame-img');

        const loop = () => {
            ctx.drawImage(video, 0, 0, 720, 1280);
            if(frame.src) ctx.drawImage(frame, 0, 0, 720, 1280);
            if(recorder && recorder.state === 'recording') requestAnimationFrame(loop);
        };

        const recStream = canvas.captureStream(30);
        recorder = new MediaRecorder(recStream, { mimeType: 'video/webm;codecs=vp8', videoBitsPerSecond: 4000000 });
        recorder.ondataavailable = e => chunks.push(e.data);
        recorder.onstop = () => process();
        
        recorder.start();
        loop();
        setTimeout(() => recorder.stop(), 8000); // 8 segundos
    }

    async function process() {
        const loader = document.getElementById('loader');
        const lt = document.getElementById('loader-text');
        const pb = document.getElementById('progress-bar');
        
        loader.style.display = 'flex';
        lt.innerText = "RENDERIZANDO...";
        
        const blob = new Blob(chunks, { type: 'video/webm' });
        await ffmpeg.writeFile('in.webm', await fetchFile(blob));

        // COMANDOS OTIMIZADOS (Preset Ultrafast para não travar)
        let cmd = "";
        if(selectedFX === 'boom') {
            cmd = "-i in.webm -filter_complex [0:v]setpts=0.8*PTS[v];[v]reverse[r];[v][r]concat=n=2:v=1 -preset ultrafast output.mp4";
        } else if(selectedFX === 'slow') {
            cmd = "-i in.webm -vf setpts=2.0*PTS -preset ultrafast output.mp4";
        } else if(selectedFX === 'rev') {
            cmd = "-i in.webm -vf reverse,setpts=1.5*PTS -preset ultrafast output.mp4";
        } else {
            cmd = "-i in.webm -vf setpts=0.5*PTS -preset ultrafast output.mp4";
        }

        ffmpeg.setProgress(({ ratio }) => { pb.style.width = (ratio * 100) + "%"; });
        
        await ffmpeg.run(...cmd.split(" "));
        
        const data = ffmpeg.readFile('output.mp4');
        const finalBlob = new Blob([data.buffer], { type: 'video/mp4' });
        
        // Aqui chamaria a função de Upload para Cloudflare
        alert("Vídeo Processado com Sucesso!");
        loader.style.display = 'none';
    }

    function toggleCam() {
        currentCam = (currentCam === "environment") ? "user" : "environment";
        startVideo();
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PHOTO MOVIE - Módulo Câmera</title>
    <style>
        body { margin: 0; background: #000; color: white; font-family: sans-serif; overflow: hidden; }
        
        /* Títulos Fixos */
        .brand-layer {
            position: fixed; top: 20px; width: 100%; text-align: center; z-index: 100;
            pointer-events: none; text-shadow: 0 0 10px #9200ff;
        }
        .neon { color: #9200ff; font-size: 2.5rem; margin: 0; font-weight: 900; }

        /* Preview da Câmera */
        #main-canvas { width: 100vw; height: 100vh; object-fit: cover; background: #222; }
        #raw-video { display: none; }

        /* Controles */
        .controls {
            position: fixed; bottom: 50px; width: 100%;
            display: flex; justify-content: space-around; align-items: center; z-index: 200;
        }
        .shutter {
            width: 80px; height: 80px; border: 5px solid white; border-radius: 50%;
            background: transparent; cursor: pointer; box-shadow: 0 0 20px #9200ff;
        }
        
        /* Avisos */
        #status-overlay {
            position: fixed; inset: 0; display: none;
            align-items: center; justify-content: center; background: rgba(0,0,0,0.5);
            font-size: 3rem; font-weight: 900; z-index: 300;
        }
    </style>
</head>
<body>

    <div class="brand-layer">
        <h1 class="neon">PHOTO MOVIE</h1>
        <div style="letter-spacing: 3px;">COLECIONANDO MOMENTOS</div>
    </div>

    <canvas id="main-canvas"></canvas>
    <video id="raw-video" autoplay playsinline muted></video>

    <div id="status-overlay"></div>

    <div class="controls">
        <button onclick="location.reload()" style="background:none; border:none; color:#9200ff; font-size:2rem;">❮</button>
        <div class="shutter" id="btn-rec" onclick="iniciarFluxo()"></div>
        <div style="width:40px"></div>
    </div>

<script>
    const canvas = document.getElementById('main-canvas');
    const ctx = canvas.getContext('2d');
    const video = document.getElementById('raw-video');
    const overlay = document.getElementById('status-overlay');
    let frameImg = new Image();
    let recorder;
    let chunks = [];

    // 1. Iniciar Câmera e Carregar Moldura (Substitua o link pela sua moldura de teste)
    async function setup() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "environment", width: 720, height: 1280 },
                audio: false 
            });
            video.srcObject = stream;
            
            // Tenta carregar a moldura salva ou uma padrão
            frameImg.src = localStorage.getItem('lastFrame') || ''; 
            
            canvas.width = 720;
            canvas.height = 1280;
            
            draw();
        } catch (err) {
            alert("Erro ao abrir câmera: " + err);
        }
    }

    // 2. Loop de Renderização (Aqui garante que não fique preto)
    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        
        if (frameImg.complete && frameImg.src) {
            ctx.drawImage(frameImg, 0, 0, canvas.width, canvas.height);
        }
        requestAnimationFrame(draw);
    }

    // 3. Lógica de Gravação
    function iniciarFluxo() {
        let count = 3;
        overlay.style.display = 'flex';
        overlay.style.color = 'white';
        
        const timer = setInterval(() => {
            overlay.innerText = count;
            if (count <= 0) {
                clearInterval(timer);
                gravar();
            }
            count--;
        }, 1000);
    }

    function gravar() {
        chunks = [];
        const stream = canvas.captureStream(30);
        recorder = new MediaRecorder(stream, { mimeType: 'video/webm;codecs=vp8' });

        recorder.ondataavailable = e => chunks.push(e.data);
        recorder.onstop = () => {
            const blob = new Blob(chunks, { type: 'video/webm' });
            // Aqui simulamos o salvamento. Na parte 2 faremos o IndexedDB.
            const url = URL.createObjectURL(blob);
            console.log("Vídeo gerado: ", url);
            overlay.innerText = "SALVO!";
            setTimeout(() => overlay.style.display = 'none', 1000);
        };

        recorder.start();
        
        let tempo = 10;
        let progresso = setInterval(() => {
            tempo--;
            overlay.innerText = tempo + "s";
            if (tempo <= 3) overlay.style.color = '#ff8c00'; // Laranja
            if (tempo <= 0) {
                clearInterval(progresso);
                recorder.stop();
                overlay.innerText = "FINALIZOU!";
                overlay.style.color = '#ff0000'; // Vermelho
            }
        }, 1000);
    }

    setup();
</script>
</body>
</html>

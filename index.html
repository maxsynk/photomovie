<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CENTRAL - Photo Print</title>
    <style>
        :root { 
            --turquesa: #00ced1; 
            --dourado: #d4af37; 
            --dourado-dark: #b8860b;
            --dark: #052c2e; /* Um turquesa bem escuro para o fundo não cansar a vista */
        }
        
        body { 
            margin: 0; 
            background: var(--dark); 
            color: white; 
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* Título grande conforme solicitado */
        .header {
            margin-top: 1.8cm;
            text-align: center;
        }

        .header h1 {
            color: var(--turquesa);
            font-size: 42px;
            font-weight: 900;
            letter-spacing: -1px;
            margin: 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .header p {
            color: var(--dourado);
            font-size: 18px;
            margin: 5px 0 0 0;
            font-style: italic;
            letter-spacing: 1px;
        }

        .main-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            width: 85%;
            max-width: 400px;
        }

        /* Botões Dourados */
        .btn-central {
            padding: 20px;
            margin: 12px 0;
            border-radius: 50px; /* Mais arredondado para estilo premium */
            border: none;
            background: linear-gradient(145deg, var(--dourado), var(--dourado-dark));
            color: #000; /* Texto preto no dourado para leitura */
            font-weight: 800;
            font-size: 16px;
            text-transform: uppercase;
            cursor: pointer;
            text-decoration: none;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            display: none; 
            transition: all 0.2s ease;
        }

        .btn-central:active {
            transform: scale(0.95);
            filter: brightness(1.2);
        }

        #btn-login {
            display: block;
            background: var(--turquesa);
            color: #000;
        }

        .footer-status {
            margin-bottom: 25px;
            font-size: 12px;
            color: var(--turquesa);
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.7;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>PHOTO PRINT</h1>
        <p>colecionando momentos</p>
    </div>

    <div class="main-container" id="menu-central">
        <button id="btn-login" class="btn-central" onclick="autenticar()">🔓 INICIAR SISTEMA</button>

        <a href="https://phottoprint.github.io/photomovie/" class="btn-protected btn-central">📸 NOVO EVENTO</a>
        <a href="https://phottoprint.github.io/photomovie/galeria.html" class="btn-protected btn-central">🎞️ ACESSAR GALERIA</a>
        
        <button id="btn-lock" class="btn-protected btn-central" onclick="bloquear()" style="background: #333; color: #fff; margin-top: 20px; font-size: 11px;">BLOQUEAR PAINEL</button>
    </div>

    <div class="footer-status">sistema de gestao 360</div>

<script>
    const SENHA_MESTRA = "1234"; 

    async function autenticar() {
        // TENTA BIOMETRIA (WebAuthn)
        if (window.PublicKeyCredential) {
            try {
                // O navegador solicita ao sistema operacional a validação (Digital/FaceID/PIN)
                // Nota: Em alguns dispositivos, isso só ativa após configuração de domínio.
                const available = await PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable();
                if (available) {
                    // Aqui simulamos o gatilho da biometria nativa. 
                    // Para um sistema Web puro, o prompt de senha é o fallback imediato.
                    console.log("Biometria pronta.");
                }
            } catch (e) {
                console.error("Erro biometria:", e);
            }
        }

        // SENHA NUMÉRICA
        const senha = prompt("ACESSO RESTRITO\nDigite sua senha numérica:");

        if (senha === SENHA_MESTRA) {
            liberarSistema();
        } else if (senha !== null) {
            alert("Senha incorreta!");
        }
    }

    function liberarSistema() {
        document.getElementById('btn-login').style.display = 'none';
        const botoes = document.querySelectorAll('.btn-protected');
        botoes.forEach(b => b.style.display = 'block');
        
        if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
    }

    function bloquear() {
        if(confirm("Deseja bloquear o acesso?")) {
            location.reload();
        }
    }
</script>
</body>
</html>

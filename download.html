<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DOWNLOAD - Photo Movie</title>
    <style>
        :root { 
            --turquesa-dark: #003333; 
            --dourado: #c5a059;      
            --dourado-fosco: #8e6d2d;
        }
        
        body { 
            margin: 0; 
            background: var(--turquesa-dark); 
            color: white; 
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            box-sizing: border-box;
        }

        .header {
            text-align: center;
            margin-bottom: 25px;
            margin-top: 10px;
        }

        .header h1 {
            color: var(--dourado);
            font-size: 32px;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-weight: 900;
        }

        .video-number-label {
            color: var(--dourado);
            letter-spacing: 2px;
            font-weight: 600;
            margin-top: 5px;
            display: block;
        }

        .video-preview {
            width: 100%;
            max-width: 400px;
            border-radius: 20px;
            overflow: hidden;
            border: 2px solid var(--dourado);
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            background: #000;
            line-height: 0;
        }

        video {
            width: 100%;
            display: block;
        }

        .btn-download {
            margin-top: 35px;
            width: 100%;
            max-width: 320px;
            padding: 18px;
            border-radius: 50px;
            background: linear-gradient(135deg, var(--dourado), var(--dourado-fosco));
            color: #000;
            text-align: center;
            text-decoration: none;
            font-weight: 800;
            text-transform: uppercase;
            font-size: 16px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            transition: transform 0.2s;
            border: none;
            cursor: pointer;
        }

        .btn-download:active { transform: scale(0.95); }

        .info-text {
            margin-top: 20px;
            font-size: 11px;
            color: rgba(255,255,255,0.4);
            text-align: center;
            max-width: 250px;
        }

        .btn-back {
            color: white;
            margin-top: 40px;
            font-size: 13px;
            opacity: 0.6;
            text-decoration: none;
            border-bottom: 1px solid rgba(255,255,255,0.2);
            padding-bottom: 2px;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>PHOTO MOVIE</h1>
        <span id="video-number" class="video-number-label">CARREGANDO...</span>
    </div>

    <div class="video-preview">
        <video id="player" controls playsinline autoplay loop muted></video>
    </div>

    <a href="#" id="link-download" class="btn-download">BAIXAR VÍDEO</a>

    <p class="info-text">DICA: Se o download não iniciar ao clicar, pressione o vídeo e escolha "Fazer download do vídeo".</p>
    
    <a href="galeria.html" class="btn-back">← Voltar para galeria</a>

<script>
    // Configurações
    const WORKER_URL = 'https://photomovie.maxprimefotovideo.workers.dev';
    
    function inicializarVisualizador() {
        const params = new URLSearchParams(window.location.search);
        
        // Tenta pegar 'id' ou 'uuid' (para evitar erros de nome de parâmetro)
        const videoId = params.get('id') || params.get('uuid');
        const numero = params.get('n') || params.get('numero');

        if (!videoId) {
            document.getElementById('video-number').innerText = "ERRO: ID NÃO ENCONTRADO";
            document.getElementById('video-number').style.color = "red";
            return;
        }

        const videoSrc = `${WORKER_URL}/stream?id=${videoId}`;
        const player = document.getElementById('player');
        const downloadBtn = document.getElementById('link-download');
        
        // Atualiza o número do vídeo no topo
        if (numero) {
            document.getElementById('video-number').innerText = `VÍDEO #${numero}`;
        } else {
            document.getElementById('video-number').innerText = `VÍDEO 360°`;
        }

        // Carrega o vídeo no player
        player.src = videoSrc;

        // Configura o link de download
        downloadBtn.href = videoSrc;
        
        // Tenta forçar o nome do arquivo no download (alguns navegadores aceitam)
        downloadBtn.setAttribute('download', `video-360-movie-${numero || '0'}.mp4`);
    }

    // Executa ao carregar a página
    window.addEventListener('DOMContentLoaded', inicializarVisualizador);
</script>
</body>
</html>

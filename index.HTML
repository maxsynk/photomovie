<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PHOTO MOVIE - Master Admin</title>
    <style>
        :root { --neon-purple: #bc13fe; --dark-bg: #050505; --card-bg: #121212; }
        body { margin: 0; background: var(--dark-bg); font-family: 'Segoe UI', sans-serif; color: white; overflow-x: hidden; }

        .screen { display: none; min-height: 100vh; padding: 20px; box-sizing: border-box; flex-direction: column; align-items: center; }
        .active { display: flex; }

        .neon-title { font-size: 2.5rem; text-shadow: 0 0 20px var(--neon-purple); animation: pulse 1.5s infinite alternate; margin-bottom: 0; }
        @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.05); } }
        
        /* Container 9:16 Fixo para Câmera e Moldura */
        .camera-box {
            position: relative; width: 100%; max-width: 360px; aspect-ratio: 9/16;
            background: #000; border: 2px solid #333; overflow: hidden; border-radius: 15px;
        }
        #video-preview { width: 100%; height: 100%; object-fit: cover; }
        #overlay-camera { position: absolute; inset: 0; pointer-events: none; background-size: 100% 100%; z-index: 10; }

        .btn-main { background: var(--neon-purple); color: white; border: none; padding: 15px 30px; border-radius: 30px; font-weight: bold; cursor: pointer; margin-top: 15px; width: 100%; max-width: 300px; }
        .form-card { background: var(--card-bg); width: 100%; max-width: 500px; padding: 20px; border-radius: 15px; border: 1px solid #333; margin-top: 20px; }
        input, select { width: 100%; padding: 12px; background: #000; border: 1px solid #333; color: white; border-radius: 8px; margin: 8px 0; }
        
        /* Galeria */
        .gallery-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; margin-top: 20px; }
        .movie-thumb { background: #1a1a1a; padding: 10px; border-radius: 8px; text-align: center; font-size: 12px; border: 1px solid #333; }
    </style>
</head>
<body>

    <div id="screen-home" class="screen active">
        <h1 class="neon-title">PHOTO MOVIE</h1>
        <p style="letter-spacing:3px">colecionando momentos</p>
        <button class="btn-main" onclick="nav('screen-config')">Configurar Evento</button>
        <button class="btn-main" style="background:#333" onclick="nav('screen-gallery')">Ver Galeria de Vídeos</button>
    </div>

    <div id="screen-config" class="screen">
        <div class="form-card">
            <h2 style="color:var(--neon-purple)">CONFIGURAÇÃO</h2>
            <label>NOME DO EVENTO</label>
            <input type="text" id="cfg-nome" placeholder="Ex: Festa VIP">
            <label>TEMPO (SEG)</label>
            <select id="cfg-tempo"><option value="8">8s</option><option value="10">10s</option></select>
            <label>MOLDURA (.PNG)</label>
            <input type="file" accept="image/png" onchange="previewFrame(this)">
            <button class="btn-main" onclick="abrirCamera()">ABRIR CÂMERA</button>
            <button class="btn-main" style="background:#444" onclick="nav('screen-home')">VOLTAR</button>
        </div>
    </div>

    <div id="screen-camera" class="screen">
        <div class="camera-box">
            <video id="video-preview" autoplay playsinline muted></video>
            <div id="overlay-camera"></div>
        </div>
        <div id="rec-timer" style="font-size:30px; margin:10px">00s</div>
        <button class="btn-main" id="btn-shoot" onclick="startCapture()">GRAVAR AGORA</button>
        <button id="btn-novo" class="btn-main" style="display:none; background:#25d366" onclick="resetParaNovo()">NOVO VÍDEO</button>
    </div>

    <div id="screen-gallery" class="screen">
        <h2>ÚLTIMOS MOVIES</h2>
        <div class="gallery-grid" id="gallery-list">
            <p style="color:#666">Nenhum vídeo gravado nesta sessão.</p>
        </div>
        <button class="btn-main" onclick="nav('screen-home')">VOLTAR PARA INÍCIO</button>
    </div>

<script>
    let config = { moldura: null, gravados: [] };
    let mediaRecorder;
    let chunks = [];

    function nav(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function previewFrame(input) {
        if (input.files[0]) {
            config.moldura = URL.createObjectURL(input.files[0]);
            document.getElementById('overlay-camera').style.backgroundImage = `url(${config.moldura})`;
        }
    }

    async function abrirCamera() {
        nav('screen-camera');
        try {
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } },
                audio: false
            });
            document.getElementById('video-preview').srcObject = stream;
            window.localStream = stream;
        } catch (e) { alert("Erro ao acessar câmera traseira."); }
    }

    function startCapture() {
        chunks = [];
        const tempo = parseInt(document.getElementById('cfg-tempo').value);
        const btn = document.getElementById('btn-shoot');
        
        mediaRecorder = new MediaRecorder(window.localStream);
        mediaRecorder.ondataavailable = e => chunks.push(e.data);
        mediaRecorder.onstop = () => {
            const blob = new Blob(chunks, { type: 'video/mp4' });
            const videoUrl = URL.createObjectURL(blob);
            config.gravados.push({ id: Math.random().toString(36).substr(2,5).toUpperCase(), url: videoUrl });
            atualizarGaleria();
        };

        mediaRecorder.start();
        btn.disabled = true; btn.innerText = "GRAVANDO...";
        
        let count = tempo;
        let timer = setInterval(() => {
            count--;
            document.getElementById('rec-timer').innerText = count.toString().padStart(2,'0')+"s";
            if(count <= 0) {
                clearInterval(timer);
                mediaRecorder.stop();
                btn.style.display = 'none';
                document.getElementById('btn-novo').style.display = 'block';
            }
        }, 1000);
    }

    function resetParaNovo() {
        document.getElementById('btn-shoot').style.display = 'block';
        document.getElementById('btn-shoot').disabled = false;
        document.getElementById('btn-shoot').innerText = "GRAVAR AGORA";
        document.getElementById('btn-novo').style.display = 'none';
        document.getElementById('rec-timer').innerText = "00s";
    }

    function atualizarGaleria() {
        const list = document.getElementById('gallery-list');
        list.innerHTML = config.gravados.map(m => `
            <div class="movie-thumb">
                <strong>ID: ${m.id}</strong><br>
                <a href="${m.url}" download="movie-${m.id}.mp4" style="color:var(--neon-purple)">Baixar Vídeo</a>
            </div>
        `).join('');
    }
</script>
</body>
</html>

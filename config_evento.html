<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CONFIGURAR EVENTO - Photo Movie</title>
    <style>
        :root { 
            --turquesa: #003333; 
            --dourado: #c5a059; 
            --dourado-fosco: #8e6d2d;
            --preto: #000;
        }
        
        body { 
            margin: 0; background: var(--preto); color: white; 
            font-family: 'Segoe UI', sans-serif; padding-bottom: 40px;
        }

        .header {
            background: var(--turquesa); padding: 20px; text-align: center;
            border-bottom: 2px solid var(--dourado);
        }

        .container { padding: 20px; max-width: 500px; margin: 0 auto; }

        .section {
            background: #111; border: 1px solid #333; padding: 25px 20px;
            border-radius: 20px; margin-bottom: 20px;
        }

        .section h3 { 
            color: var(--dourado); margin-top: 0; font-size: 14px; 
            text-transform: uppercase; letter-spacing: 1px; border-bottom: 1px solid #222;
            padding-bottom: 12px; margin-bottom: 20px;
        }

        label { display: block; font-size: 13px; margin: 15px 0 10px 0; color: #aaa; font-weight: bold; }

        input[type="text"], select {
            width: 100%; padding: 15px; background: #000; border: 1px solid #444;
            color: white; border-radius: 12px; box-sizing: border-box; font-size: 16px;
        }

        /* 1. SELETOR DE TEMPO MENOR E CIRCULAR */
        .time-selector { display: flex; justify-content: center; gap: 15px; }
        .time-btn {
            background: #222; border: 1px solid #444; color: #888;
            width: 50px; height: 50px; border-radius: 50%; cursor: pointer; font-weight: bold; font-size: 14px;
            transition: 0.3s;
        }
        .time-btn.active { border-color: var(--dourado); color: var(--dourado); background: rgba(197, 160, 89, 0.1); box-shadow: 0 0 10px rgba(197, 160, 89, 0.2); }

        /* 2. PRESETS E TIMELINE */
        .preset-group { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .preset-btn {
            background: #1a1a1a; border: 1px solid #444; color: #fff;
            font-size: 11px; padding: 10px 15px; border-radius: 25px; cursor: pointer; text-transform: uppercase;
        }
        .preset-btn.active { background: var(--dourado); color: #000; border-color: var(--dourado); font-weight: bold; }
        
        .speed-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
        .speed-box { text-align: center; background: #000; padding: 10px; border-radius: 12px; border: 1px solid #333; }
        .speed-box span { font-size: 10px; display: block; margin-bottom: 8px; color: var(--dourado); font-weight: 900; }

        /* 3. MODAL DE ÁUDIO (ESTILO APP) */
        .music-btn-trigger {
            width: 100%; padding: 18px; background: #1a1a1a; border: 2px dashed var(--dourado);
            color: var(--dourado); border-radius: 15px; cursor: pointer; font-weight: bold;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }

        .modal {
            position: fixed; inset: 0; background: var(--preto); z-index: 9999;
            display: none; flex-direction: column; padding: 20px;
        }
        .modal.active { display: flex; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; padding-bottom: 15px; }

        .modal-body { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .music-icon-big { width: 100px; height: 100px; background: var(--turquesa); border-radius: 25px; display: flex; align-items: center; justify-content: center; font-size: 50px; margin-bottom: 20px; border: 2px solid var(--dourado); }
        
        audio { width: 100%; height: 55px; filter: invert(1); margin-bottom: 30px; }

        .time-input-large {
            display: flex; align-items: center; gap: 15px; background: #111; padding: 20px; border-radius: 20px; border: 1px solid #333;
        }
        .time-input-large input { width: 80px; font-size: 24px; text-align: center; background: transparent; border: none; color: var(--dourado); font-weight: bold; outline: none; }

        /* 4. PREVIEW MOLDURA AMPLIADO */
        .frame-upload-wrapper { display: flex; flex-direction: column; align-items: center; gap: 15px; }
        #frame-preview { 
            width: 150px; height: 150px; border: 2px solid var(--dourado); 
            display: none; object-fit: contain; background: #222;
            padding: 8px; border-radius: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        .btn-save {
            width: 100%; padding: 22px; background: linear-gradient(135deg, var(--dourado), var(--dourado-fosco));
            border: none; border-radius: 50px; color: #000; font-weight: 900;
            text-transform: uppercase; cursor: pointer; font-size: 18px; margin-top: 30px;
        }

        .file-label {
            display: block; width: 100%; padding: 18px; background: #1a1a1a;
            border: 2px dashed var(--dourado); color: var(--dourado);
            text-align: center; border-radius: 12px; cursor: pointer; font-size: 14px; font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="header">
        <h2 style="color:var(--dourado); margin:0; font-size: 28px;">PHOTO MOVIE</h2>
        <span style="font-size:11px; letter-spacing:3px; opacity: 0.8;">EVENT CONFIGURATOR</span>
    </div>

    <div class="container">
        <div class="section">
            <h3>1. Identificação e Tempo</h3>
            <label>NOME DO EVENTO</label>
            <input type="text" id="conf-nome" placeholder="Nome do Evento">
            
            <label style="text-align:center">DURAÇÃO DA GRAVAÇÃO</label>
            <div class="time-selector">
                <button class="time-btn" onclick="setTime(8, this)">8s</button>
                <button class="time-btn active" onclick="setTime(10, this)">10s</button>
                <button class="time-btn" onclick="setTime(12, this)">12s</button>
            </div>
            <input type="hidden" id="conf-tempo" value="10">
        </div>

        <div class="section">
            <h3>2. Velocidade (Timeline)</h3>
            <label>PRESETS DE MOVIMENTO</label>
            <div class="preset-group">
                <button class="preset-btn" onclick="applyPreset('fast-slow-fast', this)">Fast-Slow-Fast</button>
                <button class="preset-btn" onclick="applyPreset('ultra-slow', this)">Ultra Slow</button>
                <button class="preset-btn" onclick="applyPreset('boomerang', this)">Boomerang</button>
            </div>
            
            <div class="speed-grid">
                <div class="speed-box"><span>INÍCIO</span>
                    <select id="speed-start"><option value="2">2x</option><option value="1.5">1.5x</option><option value="1" selected>1x</option></select>
                </div>
                <div class="speed-box"><span>MEIO</span>
                    <select id="speed-mid"><option value="0.5" selected>0.5x</option><option value="0.25">0.25x</option><option value="1">1x</option></select>
                </div>
                <div class="speed-box"><span>FIM</span>
                    <select id="speed-end"><option value="2">2x</option><option value="1.5">1.5x</option><option value="1">1x</option></select>
                </div>
            </div>
        </div>

        <div class="section">
            <h3>3. Trilha Sonora</h3>
            <div class="music-btn-trigger" onclick="toggleModal('music-modal', true)">
                <span id="music-status-text">🎵 SELECIONAR E EDITAR MÚSICA</span>
            </div>
        </div>

        <div class="section">
            <h3>4. Identidade Visual</h3>
            <div class="frame-upload-wrapper">
                <label class="file-label" for="overlay-file">🖼️ CARREGAR MOLDURA (PNG)</label>
                <img id="frame-preview" src="" alt="Preview Moldura">
            </div>
            <input type="file" id="overlay-file" accept="image/png" style="display:none" onchange="handleFrame(this)">
        </div>

        <button class="btn-save" onclick="salvarConfig()">SALVAR E ABRIR CÂMERA</button>
    </div>

    <div id="music-modal" class="modal">
        <div class="modal-header">
            <button onclick="toggleModal('music-modal', false)" style="background:none; border:none; color:#ff4444; font-weight:bold; font-size:16px;">CANCELAR</button>
            <span style="font-weight:bold; color:var(--dourado)">EDITOR DE ÁUDIO</span>
            <button onclick="toggleModal('music-modal', false)" style="background:none; border:none; color:#44ff44; font-weight:bold; font-size:16px;">PRONTO</button>
        </div>
        
        <div class="modal-body">
            <div class="music-icon-big">🎵</div>
            <h4 id="music-filename-display" style="margin-bottom:30px; text-align:center; color:#888;">Nenhum arquivo selecionado</h4>

            <audio id="audio-player" controls></audio>

            <div class="time-input-large">
                <span style="font-size:12px; color:#aaa; font-weight:bold;">INICIAR EM:</span>
                <input type="number" id="musica-offset" value="0">
                <span style="font-size:14px; color:var(--dourado);">seg</span>
            </div>

            <label class="file-label" for="musica-file" style="margin-top:40px; border-style:solid; background:var(--turquesa)">BUSCAR MP3 NO DISPOSITIVO</label>
            <input type="file" id="musica-file" accept="audio/*" style="display:none" onchange="handleAudio(this)">
        </div>
    </div>

<script>
    function toggleModal(id, show) {
        document.getElementById(id).style.display = show ? 'flex' : 'none';
    }

    function setTime(val, btn) {
        document.getElementById('conf-tempo').value = val;
        document.querySelectorAll('.time-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    function applyPreset(type, btn) {
        document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const s = document.getElementById('speed-start');
        const m = document.getElementById('speed-mid');
        const e = document.getElementById('speed-end');
        if(type === 'fast-slow-fast') { s.value="2"; m.value="0.5"; e.value="2"; }
        if(type === 'ultra-slow') { s.value="1"; m.value="0.25"; e.value="1"; }
        if(type === 'boomerang') { s.value="1.5"; m.value="1"; e.value="1.5"; }
    }

    function handleAudio(input) {
        const file = input.files[0];
        if (file) {
            const url = URL.createObjectURL(file);
            const player = document.getElementById('audio-player');
            player.src = url;
            document.getElementById('music-filename-display').innerText = file.name;
            document.getElementById('music-status-text').innerText = "✅ " + file.name.substring(0, 15) + "...";
        }
    }

    function handleFrame(input) {
        const file = input.files[0];
        if (file) {
            const url = URL.createObjectURL(file);
            const img = document.getElementById('frame-preview');
            img.src = url; img.style.display = 'block';
            document.querySelector('label[for="overlay-file"]').innerText = "✅ MOLDURA CARREGADA";
        }
    }

    function salvarConfig() {
        const config = {
            nome: document.getElementById('conf-nome').value || "Evento 360",
            tempo: document.getElementById('conf-tempo').value,
            velocidades: {
                inicio: document.getElementById('speed-start').value,
                meio: document.getElementById('speed-mid').value,
                fim: document.getElementById('speed-end').value
            },
            musicaOffset: document.getElementById('musica-offset').value
        };
        localStorage.setItem('config_evento', JSON.stringify(config));
        alert("Configuração Salva com Sucesso!");
        window.location.href = 'novo_evento.html';
    }
</script>
</body>
</html>

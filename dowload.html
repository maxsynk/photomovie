<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Vídeo 360</title>
    <style>
        body { background: #000; color: #fff; text-align: center; font-family: sans-serif; padding: 20px; }
        video { width: 100%; max-width: 400px; border: 2px solid #00f2ff; border-radius: 15px; background: #111; }
        .btn { display: block; background: #9200ff; color: white; padding: 20px; margin-top: 20px; text-decoration: none; border-radius: 10px; font-weight: bold; }
    </style>
</head>
<body>
    <h2 id="msg">CARREGANDO VÍDEO...</h2>
    <video id="player" controls autoplay loop playsinline></video>
    <a id="downloadBtn" class="btn" href="#" download="meu-video-360.webm">BAIXAR VÍDEO</a>

    <script>
        const params = new URLSearchParams(window.location.search);
        const id = params.get('id');
        const fx = params.get('fx');
        
        if (id) {
            const videoUrl = `https://photomovie.maxprimefotovideo.workers.dev/stream?id=${id}`;
            const v = document.getElementById('player');
            const d = document.getElementById('downloadBtn');
            
            v.src = videoUrl;
            d.href = videoUrl;
            
            v.oncanplay = () => {
                document.getElementById('msg').innerText = "SEU VÍDEO ESTÁ PRONTO!";
                if(fx === 'slow') v.playbackRate = 0.5;
            };

            v.onerror = () => {
                document.getElementById('msg').innerText = "ERRO AO CARREGAR VÍDEO";
            };
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PHOTO MOVIE Pro - Camera</title>
    <style>
        :root { --turquesa: #00d1d1; --dourado: #c5a059; }
        body { margin: 0; background: #000; color: white; font-family: sans-serif; overflow: hidden; }
        #cam-container { width: 100%; height: 100vh; position: relative; }
        #vid-preview { width: 100%; height: 100%; object-fit: cover; }
        
        /* Moldura visual apenas para o utilizador ver enquanto grava */
        #moldura-guia { 
            position: absolute; inset: 0; width: 100%; height: 100%; 
            pointer-events: none; object-fit: fill; z-index: 10; 
        }

        .controls { position: absolute; bottom: 80px; width: 100%; display: flex; justify-content: center; z-index: 100; }
        .shutter { width: 80px; height: 80px; background: var(--turquesa); border-radius: 50%; border: 4px solid white; cursor: pointer; }
        #status-msg { position: fixed; inset: 0; display: none; align-items: center; justify-content: center; z-index: 1500; background: rgba(0,0,0,0.4); font-size: 5rem; font-weight: bold; }
        #upload-loading { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 3000; display: none; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div id="cam-container">
        <video id="vid-preview" autoplay playsinline muted></video>
        <img id="moldura-guia" src="" style="display:none;">
        
        <canvas id="record-canvas" width="720" height="1280" style="display:none;"></canvas>
        <div id="status-msg"></div>
        
        <div class="controls">
            <div class="shutter" onclick="iniciarContagem()"></div>
        </div>
    </div>

    <div id="upload-loading">
        <div style="font-size: 24px;">A PROCESSAR E ENVIAR...</div>
    </div>

<script>
    let stream, recorder, chunks = [], currentFacingMode = "environment";
    const video = document.getElementById('vid-preview');
    const canvas = document.getElementById('record-canvas');
    const ctx = canvas.getContext('2d');
    const guia = document.getElementById('moldura-guia');
    const msg = document.getElementById('status-msg');
    
    // IMPORTANTE: Criamos a imagem da moldura via JS para garantir o CORS
    const imgMoldura = new Image();
    imgMoldura.crossOrigin = "anonymous"; // ISSO É VITAL

    window.onload = () => {
        const config = JSON.parse(localStorage.getItem('config_atual'));
        if(config && config.moldura) {
            imgMoldura.src = config.moldura;
            guia.src = config.moldura;
            guia.style.display = 'block';
        }
        ligarCamera();
    };

    async function ligarCamera() {
        stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: currentFacingMode, width: 1280, height: 720 },
            audio: false
        });
        video.srcObject = stream;
    }

    function iniciarContagem() {
        let c = 3;
        msg.style.display = 'flex';
        msg.innerText = c;
        let t = setInterval(() => {
            c--;
            if(c > 0) msg.innerText = c;
            else { clearInterval(t); msg.style.display = 'none'; gravar(); }
        }, 1000);
    }

    function gravar() {
        chunks = [];
        const config = JSON.parse(localStorage.getItem('config_atual'));
        const tempo = config ? parseInt(config.tempo) : 10;

        const drawLoop = () => {
            // 1. Limpa o canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // 2. Desenha o vídeo
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            // 3. Desenha a moldura (SÓ SE JÁ TIVER CARREGADO)
            if (imgMoldura.complete && imgMoldura.naturalWidth !== 0) {
                ctx.drawImage(imgMoldura, 0, 0, canvas.width, canvas.height);
            }

            if (recorder && recorder.state === "recording") {
                requestAnimationFrame(drawLoop);
            }
        };

        const recStream = canvas.captureStream(30);
        recorder = new MediaRecorder(recStream, { mimeType: 'video/webm;codecs=vp8' });
        
        recorder.ondataavailable = e => chunks.push(e.data);
        recorder.onstop = async () => {
            const blob = new Blob(chunks, { type: 'video/webm' });
            enviar(blob, config.nome);
        };

        recorder.start();
        drawLoop();
        setTimeout(() => recorder.stop(), tempo * 1000);
    }

    async function enviar(blob, evento) {
        document.getElementById('upload-loading').style.display = 'flex';
        const formData = new FormData();
        formData.append("video", blob);
        formData.append("uuid", "vid_" + Date.now());
        formData.append("evento", evento);

        await fetch("https://photomovie.maxprimefotovideo.workers.dev/upload", { 
            method: 'POST', 
            body: formData 
        });
        window.location.href = 'galeria.html';
    }
</script>
</body>
</html>
